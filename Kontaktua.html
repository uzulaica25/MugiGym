<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerFit Gym - Galdetegi Modal</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   <style>
  body {
    background-color: #000; 
    color: #fff; 
  }

</style>
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand " href="index.html">MugiGym</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menua">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menua">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Hasiera</a></li>
        <li class="nav-item"><a class="nav-link" href="Prezioa.html">Prezioak</a></li>
        <li class="nav-item"><a class="nav-link active" href="kontaktua.html">Kontaktua</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="py-5" >
  <div class="container">
    <div class="row g-4">
      <div class="col-md-6">
        <p><strong>Telefonoa:</strong> 688 123 456</p>
        <p><strong>Emaila:</strong> mugigym@gmail.com</p>
        <p><strong>Helbidea:</strong> Azpeitia, Barrenetxe Auzoa 3</p>
        <p><strong>Ordutegia:</strong> </p>
        <p><strong></strong> Astelehena - Larunbata 6:00 - 00:00</p>
        <p><strong></strong> Igandea 8:00 - 20:00</p>
      </div>

      <div class="col-md-6">
        <form id="kontaktuaForm">
          <div class="mb-3">
            <label class="form-label">Izen-Abizenak</label>
            <input type="text" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Emaila</label>
            <input type="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Mezua</label>
            <textarea class="form-control" rows="3" required></textarea>
          </div>
          <button type="submit" class="btn btn-dark btn-lg">Bidali</button>
        </form>
      </div>
    </div>

  </div>
</section>


<div class="modal fade" id="modalBidali" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-dark">Eskerrik asko!</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-dark">
        Zure mezua jaso duzu. Laster iritsiko zaizu.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Itxi</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const form = document.getElementById("kontaktuaForm");
  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const modal = new bootstrap.Modal(document.getElementById("modalBidali"));
    modal.show();

    form.reset();
  });
</script>

</body>



  
</html>
